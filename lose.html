<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, user-scalable=no"
    />
    <title>L.O.S.A Insurance</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      .defeat-bg {
        position: relative;
        min-height: 100vh;
        width: 100%;
        background: linear-gradient(
          135deg,
          #0a192f 0%,
          #0c2d48 40%,
          #1a4a6f 100%
        );
        display: flex;
        justify-content: center;
        align-items: center;
        font-family:
          "Segoe UI",
          "Poppins",
          "Inter",
          system-ui,
          -apple-system,
          sans-serif;
        overflow-x: hidden;
        padding: 20px;
      }

      .finance-grid {
        position: absolute;
        bottom: 0;
        left: 0;
        width: 100%;
        height: 180px;
        background: repeating-linear-gradient(
          90deg,
          rgba(255, 255, 255, 0.1) 0px,
          rgba(255, 255, 255, 0.1) 2px,
          transparent 2px,
          transparent 40px
        );
        pointer-events: none;
        z-index: 1;
      }

      .trend-line {
        position: absolute;
        bottom: 40px;
        left: 0;
        width: 100%;
        height: 120px;
        pointer-events: none;
        z-index: 2;
      }

      .trend-line svg {
        width: 100%;
        height: 100%;
      }

      .defeat-card {
        position: relative;
        z-index: 20;
        max-width: 560px;
        width: 90%;
        background: rgba(255, 255, 255, 0.97);
        backdrop-filter: blur(5px);
        border-radius: 56px;
        padding: 48px 36px 52px;
        text-align: center;
        box-shadow:
          0 30px 40px rgba(0, 0, 0, 0.3),
          0 0 0 1px rgba(100, 180, 250, 0.4);
        transition:
          transform 0.2s ease,
          box-shadow 0.2s;
        border: 1px solid rgba(100, 180, 250, 0.5);
      }
      h1 {
        font-size: 3.2rem;
        font-weight: 800;
        background: linear-gradient(135deg, #5a6e8a, #8ba0b8, #6c7f9e);
        background-clip: text;
        -webkit-background-clip: text;
        color: transparent;
        margin-bottom: 20px;
        letter-spacing: 2px;
      }

      .result-badge {
        background: #e8f0fe;
        display: inline-block;
        padding: 8px 28px;
        border-radius: 60px;
        font-weight: 600;
        font-size: 1rem;
        color: #5a6e8a;
        margin-bottom: 28px;
      }

      .description {
        color: #2c3e50;
        line-height: 1.55;
        margin-bottom: 36px;
        font-size: 1rem;
        max-width: 400px;
        margin-left: auto;
        margin-right: auto;
      }

      .btn-menu {
        background: #1a4a6f;
        color: white;
        font-size: 1.2rem;
        font-weight: 700;
        padding: 14px 44px;
        border: none;
        border-radius: 60px;
        cursor: pointer;
        font-family: inherit;
        transition: all 0.2s ease;
        box-shadow: 0 6px 0 #0c2d48;
        margin-bottom: 32px;
        width: auto;
        min-width: 260px;
      }

      .btn-menu:hover {
        background: #235f8a;
        transform: translateY(-2px);
        box-shadow: 0 8px 0 #0c2d48;
      }

      .btn-menu:active {
        transform: translateY(3px);
        box-shadow: 0 3px 0 #0c2d48;
      }

      @media (max-width: 550px) {
        .defeat-card {
          padding: 34px 24px 42px;
        }
        h1 {
          font-size: 2.3rem;
        }
        .btn-menu {
          padding: 12px 32px;
          font-size: 1rem;
          min-width: 200px;
        }
      }

      .trend-down {
        stroke-dasharray: 1200;
        stroke-dashoffset: 1200;
        animation: drawTrend 2.2s ease-out forwards;
      }

      @keyframes drawTrend {
        to {
          stroke-dashoffset: 0;
        }
      }

      @keyframes softPulse {
        0% {
          opacity: 0.7;
        }
        100% {
          opacity: 1;
        }
      }
    </style>
  </head>
  <body>
    <div class="defeat-bg">
      <div class="finance-grid"></div>
      <div class="trend-line">
        <svg viewBox="0 0 1200 120" preserveAspectRatio="none">
          <path
            d="M0,100 L1200,100"
            stroke="rgba(255, 255, 255, 0.3)"
            stroke-width="1.5"
            stroke-dasharray="4 8"
          />

          <path
            class="trend-down"
            d="M0,5 L60,6 L130,8 L210,12 L290,18 L370,28 L450,38 L530,50 L610,65 L690,78 L770,85 L850,90 L930,94 L1010,96 L1090,97 L1170,98 L1200,99"
            stroke="rgba(255, 255, 255, 0.95)"
            stroke-width="3.5"
            fill="none"
            stroke-linecap="round"
            stroke-linejoin="round"
          />
          <path
            class="trend-down"
            d="M0,5 L60,6 L130,8 L210,12 L290,18 L370,28 L450,38 L530,50 L610,65 L690,78 L770,85 L850,90 L930,94 L1010,96 L1090,97 L1170,98 L1200,99"
            stroke="rgba(255, 255, 255, 0.4)"
            stroke-width="8"
            fill="none"
            stroke-linecap="round"
            stroke-linejoin="round"
            style="
              animation: drawTrend 2.2s ease-out forwards;
              stroke-dasharray: 1200;
              stroke-dashoffset: 1200;
            "
          />
        </svg>
      </div>

      <div class="defeat-card">
        <h1>ВЫ ПРОИГРАЛИ!</h1>
        <div class="result-badge">Финансовый крах!</div>
        <div class="description">
          К сожалению, ваши финансовые решения оказались неудачными! Стоит
          изучить тему "СТРАХОВАНИЕ" и попробовать снова!
        </div>
        <button class="btn-menu" id="backToMenuBtn">ВЕРНУТЬСЯ В МЕНЮ</button>
      </div>
    </div>
  </body>
</html>
