<!doctype html>
<html lang="ru">
    <head>
      <meta charset="UTF-8" />
      <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0, user-scalable=no"
      />
      <title>L.O.S.A Insurance</title>
      <style>
        * {
          margin: 0;
          padding: 0;
          box-sizing: border-box;
        }

        .game-bg {
          position: relative;
          min-height: 100vh;
          width: 100%;
          background: linear-gradient(
            135deg,
            #0a192f 0%,
            #0c2d48 40%,
            #1a4a6f 100%
          );
          display: flex;
          justify-content: center;
          align-items: center;
          font-family:
            "Segoe UI",
            "Poppins",
            "Inter",
            system-ui,
            -apple-system,
            sans-serif;
          overflow-x: hidden;
          padding: 20px;
        }

        .finance-grid {
          position: absolute;
          bottom: 0;
          left: 0;
          width: 100%;
          height: 160px;
          background: repeating-linear-gradient(
            90deg,
            rgba(255, 255, 255, 0.12) 0px,
            rgba(255, 255, 255, 0.12) 2px,
            transparent 2px,
            transparent 40px
          );
          pointer-events: none;
          z-index: 1;
        }

        .trend-line {
          position: absolute;
          bottom: 50px;
          left: 0;
          width: 100%;
          height: 90px;
          pointer-events: none;
          z-index: 2;
        }

        .trend-line svg {
          width: 100%;
          height: 100%;
        }

        .game-card {
          position: relative;
          z-index: 20;
          max-width: 560px;
          width: 90%;
          background: rgba(255, 255, 255, 0.97);
          backdrop-filter: blur(5px);
          border-radius: 56px;
          padding: 44px 36px 52px;
          text-align: center;
          box-shadow:
            0 30px 40px rgba(0, 0, 0, 0.3),
            0 0 0 1px rgba(100, 180, 250, 0.4);
          border: 1px solid rgba(100, 180, 250, 0.5);
        }

        h1 {
          font-size: 2.7rem;
          font-weight: 800;
          background: linear-gradient(135deg, #1a4a6f, #3a86b0, #1f6390);
          background-clip: text;
          -webkit-background-clip: text;
          color: transparent;
          margin-bottom: 14px;
          letter-spacing: -0.5px;
        }

        .tagline {
          background: #e8f0fe;
          display: inline-block;
          padding: 6px 22px;
          border-radius: 60px;
          font-weight: 600;
          font-size: 0.9rem;
          color: #1a4a6f;
          margin-bottom: 28px;
        }

        .description {
          color: #2c3e50;
          line-height: 1.55;
          margin-bottom: 32px;
          font-size: 1rem;
          max-width: 460px;
          margin-left: auto;
          margin-right: auto;
        }

        .btn-start {
          background: #1a4a6f;
          color: white;
          font-size: 1.2rem;
          font-weight: 700;
          padding: 14px 44px;
          border: none;
          border-radius: 60px;
          cursor: pointer;
          font-family: inherit;
          transition: all 0.2s ease;
          box-shadow: 0 6px 0 #0c2d48;
          margin-bottom: 32px;
          width: auto;
          min-width: 220px;
        }

        .btn-start:hover {
          background: #235f8a;
          transform: translateY(-2px);
          box-shadow: 0 8px 0 #0c2d48;
        }

        .btn-start:active {
          transform: translateY(3px);
          box-shadow: 0 3px 0 #0c2d48;
        }

      </style>
    </head>
    <body>
      <div class="game-bg">
        <div class="finance-grid"></div>
        <div class="trend-line">
          <svg viewBox="0 0 1200 90" preserveAspectRatio="none">
            <path
              d="M0,70 L150,52 L280,65 L400,35 L550,48 L680,25 L800,40 L950,20 L1100,45 L1200,18"
              stroke="rgba(255, 255, 255, 0.85)"
              stroke-width="2.5"
              fill="none"
              stroke-linecap="round"
              stroke-dasharray="6 6"
            />
            <path
              d="M0,80 L1200,80"
              stroke="rgba(255, 255, 255, 0.35)"
              stroke-width="1"
              stroke-dasharray="4 8"
            />
            <path
              d="M0,70 L150,52 L280,65 L400,35 L550,48 L680,25 L800,40 L950,20 L1100,45 L1200,18"
              stroke="rgba(255, 255, 255, 0.35)"
              stroke-width="6"
              fill="none"
              stroke-linecap="round"
            />
          </svg>
        </div>

        <div class="game-card">
          <h1>L.O.S.A Insurance</h1>
          <div class="tagline">
            Управляйте капиталом. Вкладывайте. Достигайте целей.
          </div>
          <div class="description">
            Обучающая игра по финансовой грамотности. Вы учитесь распределять
            бюджет и анализировать риски.
            Пройдите сценарий и повысьте свое финансовое понимание.
          </div>
          <button class="btn-start" id="startGameBtn">СТАРТ</button>
        </div>
      </div>
      <script>
        document.getElementById("startGameBtn").addEventListener("click",()=>
        {
          localStorage.clear();
          window.location.href = 'computer.html';
        });
      </script>
    </body>
  </html>
</html>
